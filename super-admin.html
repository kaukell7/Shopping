<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Agent - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }

        /* Sidebar Style */
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { margin-bottom: 2rem; padding-left: 1rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .header { margin-bottom: 2rem; }
        
        .card { background: var(--card-bg); padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 0.6rem; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        input { padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .btn-create { background: var(--primary); color: white; padding: 0.9rem 2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; transition: 0.3s; }
        .btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item active">
            <i class="fas fa-plus-circle"></i> Add Agent
        </a>
        <a href="user-list.html" class="nav-item">
            <i class="fas fa-users"></i> User List
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-chart-line"></i> Analytics
        </a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Register New Agent</h1>
        </div>

        <div class="card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Shop Name</label>
                    <input type="text" id="shopName" placeholder="Enter shop name">
                </div>
                <div class="input-group">
                    <label>Gmail / Phone</label>
                    <input type="text" id="contact" placeholder="Email or Phone number">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password">
                </div>
            </div>
            <button class="btn-create" onclick="createAgent()">
                <i class="fas fa-plus"></i> Create & Save to Database
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        async function createAgent() {
            const name = document.getElementById('shopName').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const password = document.getElementById('password').value.trim();

            if(!name || !contact || !password) {
                return alert("အချက်အလက် အားလုံး ပြည့်စုံအောင် ဖြည့်ပေးပါ");
            }

            try {
                // user-list.html မှာ ပြသနိုင်ဖို့ "agents" collection ထဲကို သိမ်းပါတယ်
                await db.collection("agents").add({
                    name: name,
                    contact: contact,
                    password: password,
                    status: "Active",
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Agent အကောင့် ဖွင့်ပြီးပါပြီ");
                window.location.href = "user-list.html"; // အောင်မြင်ရင် User List သို့ သွားမယ်
            } catch (error) {
                console.error("Error: ", error);
                alert("ဒေတာ သိမ်းဆည်းရာမှာ အမှားအယွင်း ရှိနေပါတယ်");
            }
        }
    </script>
</body>
</html>
