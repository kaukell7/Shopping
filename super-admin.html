<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #1e293b;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
        }

        /* Sidebar Style */
        .sidebar {
            width: 260px;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: fixed;
        }

        .sidebar h2 { margin-bottom: 2rem; padding-left: 1rem; }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2.5rem;
            width: 100%;
        }

        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; color: var(--text-main); }

        /* Form Card */
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 900px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        
        input {
            padding: 0.8rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .btn-create {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
        }

        .btn-create:hover { opacity: 0.9; }

        /* Registration Display */
        .display-card {
            margin-top: 2rem;
            padding: 1.5rem;
            border-left: 4px solid #3b82f6;
            background: #eff6ff;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item active">
            <i class="fas fa-plus-circle"></i> Add Agent
        </a>
        <a href="user-list.html" class="nav-item">
            <i class="fas fa-users"></i> User List
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-chart-line"></i> Analytics
        </a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Agent Management</h1>
        </div>

        <div class="card">
            <h3>Register New Agent</h3>
            <div class="form-grid">
                <div class="input-group">
                    <label>Shop Name</label>
                    <input type="text" id="shopName" placeholder="e.g. Ali Shoes">
                </div>
                <div class="input-group">
                    <label>Gmail / Phone</label>
                    <input type="text" id="contact" placeholder="e.g. ali@gmail.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Set password">
                </div>
            </div>
            <button class="btn-create" onclick="createAgent()">
                <i class="fas fa-plus"></i> Create Agent
            </button>

            <div id="displayResult" class="display-card">
                <p><strong>Shop Name:</strong> <span id="resName"></span></p>
                <p><strong>Contact:</strong> <span id="resContact"></span></p>
                <p><strong>Password:</strong> <span id="resPass"></span></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function createAgent() {
            const name = document.getElementById('shopName').value;
            const contact = document.getElementById('contact').value;
            const password = document.getElementById('password').value;

            if(!name || !contact || !password) return alert("Please fill all fields");

            try {
                await db.collection("agents").add({
                    name: name,
                    contact: contact,
                    password: password,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('displayResult').style.display = 'block';
                document.getElementById('resName').innerText = name;
                document.getElementById('resContact').innerText = contact;
                document.getElementById('resPass').innerText = password;
                
                alert("Agent Created Successfully!");
            } catch (error) {
                console.error("Error: ", error);
            }
        }
    </script>
</body>
</html>
