<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }

        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { margin-bottom: 2rem; padding-left: 1rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .card { background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 2.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 0.6rem; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        input { padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .btn-create { background: var(--primary); color: white; padding: 0.9rem 2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; transition: 0.2s; }
        .btn-create:hover { background: #4338ca; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 1rem; border-bottom: 2px solid #f1f5f9; color: var(--text-sub); font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-disabled { background: #fee2e2; color: #991b1b; }
        
        .action-btn { border: none; background: none; cursor: pointer; padding: 5px; font-size: 1rem; transition: 0.2s; margin-right: 8px; }
        .btn-toggle { color: var(--primary); }
        .btn-delete { color: var(--danger); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item active"><i class="fas fa-plus-circle"></i> &nbsp; Add Agent</a>
        <a href="user_list.html" class="nav-item"><i class="fas fa-users"></i> &nbsp; User List</a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i> &nbsp; Analytics</a>
    </div>

    <div class="main-content">
        <h1>Super Admin Control</h1>

        <div class="card">
            <h3>Register New Agent</h3>
            <div class="form-grid">
                <div class="input-group">
                    <label>Shop Name</label>
                    <input type="text" id="shopName" placeholder="Enter shop name">
                </div>
                <div class="input-group">
                    <label>Gmail / Phone</label>
                    <input type="text" id="contact" placeholder="Email or Phone">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password">
                </div>
            </div>
            <button class="btn-create" onclick="createAgent()">
                <i class="fas fa-plus"></i> Create Agent
            </button>
        </div>

        <div class="card">
            <h3>Manage Agents</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Shop Name</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="agentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        async function createAgent() {
            const name = document.getElementById('shopName').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const password = document.getElementById('password').value.trim();

            if(!name || !contact || !password) return alert("အချက်အလက် အားလုံး ဖြည့်ပေးပါ");

            try {
                const checkDuplicate = await db.collection("agents").where("gmail_phone", "==", contact).get();
                if (!checkDuplicate.empty) return alert("ဤ Gmail/ဖုန်းဖြင့် အကောင့်ရှိနှင့်ပြီးသားပါ။");

                await db.collection("agents").add({
                    name, 
                    gmail_phone: contact, 
                    password, 
                    status: "Active",
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Agent အကောင့် အောင်မြင်စွာ ဖွင့်ပြီးပါပြီ");
                document.getElementById('shopName').value = '';
                document.getElementById('contact').value = '';
                document.getElementById('password').value = '';
                
                // အောင်မြင်ရင် user_list.html ကို တိုက်ရိုက်သွားလိုပါက အောက်ပါ code ကို သုံးနိုင်ပါတယ်
                // window.location.href = "user_list.html";

            } catch (error) { 
                console.error(error);
                alert("Error: Missing Permissions. Firebase Console တွင် Rules ကို စစ်ဆေးပါ။"); 
            }
        }

        db.collection("agents").orderBy("created_at", "desc").onSnapshot((snapshot) => {
            const tbody = document.getElementById('agentTableBody');
            tbody.innerHTML = '';
            snapshot.forEach((doc) => {
                const agent = doc.data();
                const id = doc.id;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${agent.name}</strong></td>
                        <td>${agent.gmail_phone || agent.contact}</td>
                        <td><span class="status-badge ${agent.status === 'Active' ? 'status-active' : 'status-disabled'}">${agent.status || 'Active'}</span></td>
                        <td>
                            <button class="action-btn btn-toggle" onclick="toggleStatus('${id}', '${agent.status}')" title="Change Status">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteAgent('${id}')" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        });

        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === "Active" ? "Disabled" : "Active";
            if(confirm(`အေးဂျင့်ကို ${newStatus} လုပ်မှာ သေချာပါသလား?`)) {
                await db.collection("agents").doc(id).update({ status: newStatus });
            }
        }

        async function deleteAgent(id) {
            if(confirm("ဤအေးဂျင့်ကို ဖျက်ပစ်ရန် သေချာပါသလား? ပြန်ယူ၍ မရနိုင်ပါ။")) {
                await db.collection("agents").doc(id).delete();
            }
        }
    </script>
</body>
</html>
