<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }

        /* Sidebar Style */
        .sidebar { width: 260px; background: #1e293b; color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { margin-bottom: 2rem; padding-left: 1rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* Content Area */
        .main-content { margin-left: 280px; padding: 2rem; width: calc(100% - 280px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }

        /* Table Design */
        .table-container { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 1rem; font-weight: 600; color: var(--text-main); border-bottom: 1px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #e2e8f0; color: var(--text-sub); }
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .btn-back { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item">
            <i class="fas fa-plus-circle"></i> Add Agent
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-users"></i> User List
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-chart-line"></i> Analytics
        </a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Agent User List</h1>
            <a href="super-admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Register</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gmail / Phone</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        function loadUsers() {
            const tableBody = document.getElementById('userTableBody');
            db.collection("agents").orderBy("created_at", "desc").onSnapshot((querySnapshot) => {
                tableBody.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.created_at ? new Date(data.created_at.seconds * 1000).toLocaleDateString() : "N/A";
                    // Displaying Name, Contact (Gmail/Phone), and Password
                    const row = `
                        <tr>
                            <td style="font-weight:600; color:#1e293b;">${data.name || 'N/A'}</td>
                            <td>${data.contact || data.tenantId || 'N/A'}</td>
                            <td><code>${data.password || '****'}</code></td>
                            <td><span class="status-badge">Active</span></td>
                            <td>${date}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
        }
        window.onload = loadUsers;
    </script>
</body>
</html>
