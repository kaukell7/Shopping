<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: 100%; }
        .card { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .input-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        input { padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn-save { background: var(--primary); color: white; padding: 0.8rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="agent-dashboard.html" style="color:white; text-decoration:none; display:block; margin-bottom:1rem;">Dashboard</a>
        <a href="inventory.html" style="color:white; text-decoration:none;">My Products</a>
    </div>

    <div class="main-content">
        <h1>Add New Product</h1>
        <div class="card">
            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="pName" placeholder="Enter product name">
            </div>
            <div class="input-group">
                <label>Price</label>
                <input type="number" id="pPrice" placeholder="Enter price">
            </div>
            <button class="btn-save" onclick="uploadProduct()">Upload Product</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        // Firebase Config ကို super-admin.html ထဲကအတိုင်း ဒီမှာပြန်ထည့်ပါ
        const db = firebase.firestore();

        async function uploadProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const agentId = localStorage.getItem('agentId'); // Login ဝင်ထားတဲ့ Agent ID

            if(name && price) {
                await db.collection("products").add({
                    name: name,
                    price: price,
                    agentId: agentId,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("ပစ္စည်းတင်ခြင်း အောင်မြင်ပါသည်");
            }
        }
    </script>
</body>
</html>
