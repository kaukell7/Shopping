<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --sidebar: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        h1 { font-weight: 700; color: #1e293b; margin-bottom: 1.5rem; }

        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; max-width: 600px; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        input[type="text"], input[type="number"] { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Image Upload Styling */
        .image-upload-wrapper { position: relative; width: 150px; height: 150px; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; overflow: hidden; background-color: #f8fafc; }
        .image-upload-wrapper:hover { border-color: var(--primary); background-color: #eef2ff; }
        .image-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-placeholder { color: #64748b; text-align: center; font-size: 0.8rem; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .upload-placeholder i { font-size: 2rem; color: #94a3b8; }
        #imageInput { display: none; }

        .btn-create { background: var(--primary); color: white; padding: 0.9rem 2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; transition: 0.3s; font-size: 0.9rem; }
        .btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-create:disabled { background-color: #a5b4fc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="agent-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="inventory.html" class="nav-item active">
            <i class="fas fa-box-open"></i> My Products
        </a>
        <a href="profile-settings.html" class="nav-item">
            <i class="fas fa-user-cog"></i> Profile Settings
        </a>
    </div>

    <div class="main-content">
        <h1>Add New Product</h1>

        <div class="card">
            <form id="productForm">
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(this)">
                    <div class="image-upload-wrapper" onclick="document.getElementById('imageInput').click()">
                        <img src="" id="imagePreview" class="image-preview" alt="Product Image Preview">
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Click to upload image</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="shopName" placeholder="Enter product name" required>
                </div>
                
                <div class="form-group">
                    <label>Price (Ks)</label>
                    <input type="number" id="password" placeholder="Enter price" required>
                </div>

                <button type="submit" class="btn-create" id="uploadBtn">
                    <i class="fas fa-plus"></i> Upload Product
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script> <script>
        // Firebase Configuration (Go back to super-admin.html and paste your identical firebaseConfig object here)
        const firebaseConfig = {
            // Paste your actual config object here exactly like you have in your super-admin.html file
            // You can find this in your Firebase console settings or in any other file where you've set up firebase
            apiKey: "YOUR_ACTUAL_API_KEY",
            authDomain: "YOUR_ACTUAL_AUTH_DOMAIN",
            projectId: "YOUR_ACTUAL_PROJECT_ID",
            storageBucket: "my-shop-admin-cedb1.appspot.com", // This line is critical for image uploads. Please double-check it.
            messagingSenderId: "YOUR_ACTUAL_MESSAGING_SENDER_ID",
            appId: "YOUR_ACTUAL_APP_ID"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const storage = firebase.storage(); // Initialize Firebase Storage

        // Form Submission Handling
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            createProduct();
        });

        // Function to show image preview before uploading
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            const file = input.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = '';
                preview.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }

        async function createProduct() {
            const name = document.getElementById('shopName').value.trim();
            const price = document.getElementById('password').value.trim();
            const imageInput = document.getElementById('imageInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const file = imageInput.files[0];
            const agentData = JSON.parse(localStorage.getItem('currentAgent')); // Get current agent's unique ID

            // 1. Check for logged-in agent. Critical step.
            if (!agentData) {
                alert("You need to be logged in to create products.");
                window.location.href = 'login.html'; // Redirect to login
                return;
            }

            // 2. Validate input fields and image file
            if (!name || !price || !file) {
                alert("Please fill in all fields and upload a product image.");
                return;
            }

            // 3. Disable the upload button during upload to prevent multiple submissions
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                // 4. Firebase Storage: Create a unique path for the image (agentId/timestamp_filename)
                const storageRef = storage.ref(`products/${agentData.gmail_phone}/${Date.now()}_${file.name}`);
                
                // 5. Start the image upload
                const task = storageRef.put(file);

                // 6. Monitor upload progress (optional but very useful)
                // You can add progress bars here. We'll skip it for simplicity but keep the handle for future improvement.

                // 7. Wait for completion and then get the public download URL
                await task;
                const imageUrl = await storageRef.getDownloadURL(); // This is critical, we save this link in firestore

                // 8. FireStore: Save product data, linking the current agent
                // We reference the gmail_phone of the agent that creates the product so each agent can manage its own inventory.
                await db.collection("products").add({
                    name: name,
                    price: price,
                    imageUrl: imageUrl, // Save the image link to firestore
                    status: "Available",
                    agentGmailPhone: agentData.gmail_phone, // Foreign key-style reference to current agent
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 9. Success! Redirect and clear the form
                alert("Product created successfully!");
                document.getElementById('productForm').reset();
                previewImage(imageInput); // Reset the image preview too
                // Optional: Redirect back to the dashboard or to an inventory list page if you create one
                // window.location.href = "agent-dashboard.html"; 

            } catch (error) {
                console.error("Error creating product: ", error);
                alert("An error occurred during product creation. Please check the console for details.");
                uploadBtn.disabled = false; // Re-enable the button if upload fails so user can try again
                uploadBtn.innerHTML = '<i class="fas fa-plus"></i> Create Product';
            }
        }
    </script>
</body>
</html>
