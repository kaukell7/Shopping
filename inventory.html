<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --sidebar: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; max-width: 600px; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        input { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .image-upload-wrapper { width: 150px; height: 150px; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; background-color: #f8fafc; }
        .image-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn-create { background: var(--primary); color: white; padding: 0.9rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        .readonly-input { background-color: #f1f5f9; font-weight: 700; color: #4f46e5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="agent-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="inventory.html" class="nav-item active">
            <i class="fas fa-box-open"></i> My Products
        </a>
    </div>

    <div class="main-content">
        <h1>Add New Product</h1>
        <div class="card">
            <form id="productForm">
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(this)" style="display:none">
                    <div class="image-upload-wrapper" onclick="document.getElementById('imageInput').click()">
                        <img src="" id="imagePreview" class="image-preview">
                        <div id="uploadPlaceholder"><i class="fas fa-cloud-upload-alt"></i> Upload</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="shopName" placeholder="Enter product name" required>
                </div>

                <div class="form-group">
                    <label>Original Price (Ks)</label>
                    <input type="number" id="originalPrice" placeholder="50000" required oninput="calculateDiscount()">
                </div>

                <div class="form-group">
                    <label>Discount Percentage (%)</label>
                    <input type="number" id="discountPercent" placeholder="20" oninput="calculateDiscount()">
                </div>

                <div class="form-group">
                    <label>Final Price (ကျသင့်ငွေ)</label>
                    <input type="number" id="finalPrice" class="readonly-input" readonly>
                </div>

                <button type="submit" class="btn-create" id="uploadBtn">
                    <i class="fas fa-plus"></i> Upload Product
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script> 
    
    <script>
        // အရေးကြီးသည်- config ကို သင့် Project ID (spider-io) နှင့် ကိုက်အောင်ပြင်ထားပါသည်
        const firebaseConfig = {
            apiKey: "AIzaSy...", // သင့် API Key အစစ်ထည့်ပါ
            authDomain: "spider-io.firebaseapp.com",
            projectId: "spider-io",
            storageBucket: "spider-io.appspot.com", // ဤနေရာ မှားနေ၍ လည်နေခြင်းဖြစ်နိုင်ပါသည်
            messagingSenderId: "...",
            appId: "..."
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const storage = firebase.storage();

        function calculateDiscount() {
            const original = parseFloat(document.getElementById('originalPrice').value) || 0;
            const percent = parseFloat(document.getElementById('discountPercent').value) || 0;
            const finalInput = document.getElementById('finalPrice');
            finalInput.value = percent > 0 ? Math.round(original - (original * percent / 100)) : original;
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uploadBtn = document.getElementById('uploadBtn');
            const file = document.getElementById('imageInput').files[0];
            const agentData = JSON.parse(localStorage.getItem('currentAgent')) || { gmail_phone: 'default' };

            if (!file) return alert("ကျေးဇူးပြု၍ ပုံအရင်ရွေးပါ");

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                // ၁။ ပုံကို Storage သို့ တင်ခြင်း
                const storageRef = storage.ref(`products/${Date.now()}_${file.name}`);
                await storageRef.put(file);
                const imageUrl = await storageRef.getDownloadURL();

                // ၂။ Database ထဲသို့ ဒေတာသွင်းခြင်း (Field names များကို index.html နှင့် ညှိထားသည်)
                await db.collection("products").add({
                    name: document.getElementById('shopName').value,
                    original_price: document.getElementById('originalPrice').value,
                    discount_percent: document.getElementById('discountPercent').value,
                    price: document.getElementById('finalPrice').value, // Final Price ကို price အနေနှင့်သိမ်းသည်
                    imageUrl: imageUrl,
                    agentGmailPhone: agentData.gmail_phone,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("ပစ္စည်းတင်ခြင်း အောင်မြင်ပါသည်!");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Upload Product';
            }
        });
    </script>
</body>
</html>
