<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; font-size: 1.5rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .stat-card { background: white; padding: 1.8rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .stat-card h3 { margin: 0; color: #64748b; font-size: 0.95rem; font-weight: 600; }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--primary); margin: 10px 0; }
        .section-title { margin-top: 3rem; color: #1e293b; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 1rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item"><i class="fas fa-plus-circle"></i> &nbsp; Add Agent</a>
        <a href="user-list.html" class="nav-item"><i class="fas fa-users"></i> &nbsp; User List</a>
        <a href="analytics.html" class="nav-item active"><i class="fas fa-chart-line"></i> &nbsp; Analytics</a>
        <hr style="opacity: 0.1; margin: 1rem 0;">
        <a href="agent-dashboard.html" class="nav-item"><i class="fas fa-arrow-left"></i> &nbsp; Back to Dashboard</a>
    </div>

    <div class="main-content">
        <h1>Overview Analytics</h1>
        
        <div class="section-title">Agent Network Status</div>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Agents</h3>
                <div id="totalAgents" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Accounts</h3>
                <div id="activeAgents" class="stat-value" style="color: #059669;">0</div>
            </div>
            <div class="stat-card">
                <h3>Disabled Accounts</h3>
                <div id="disabledAgents" class="stat-value" style="color: #ef4444;">0</div>
            </div>
        </div>

        <div class="section-title">Platform Performance</div>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Inventory Items</h3>
                <div id="totalProducts" class="stat-value" style="color: #6366f1;">0</div>
            </div>
            <div class="stat-card">
                <h3>Platform Sales (Ks)</h3>
                <div id="totalPlatformSales" class="stat-value" style="color: #f59e0b;">0 Ks</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ၁။ အေးဂျင့်စာရင်းများကို စစ်ဆေးခြင်း
        db.collection("agents").onSnapshot((querySnapshot) => {
            let total = querySnapshot.size;
            let active = 0;
            let disabled = 0;
            
            querySnapshot.forEach((doc) => {
                if(doc.data().status === "Disabled") {
                    disabled++;
                } else {
                    active++;
                }
            });

            document.getElementById('totalAgents').innerText = total;
            document.getElementById('activeAgents').innerText = active;
            document.getElementById('disabledAgents').innerText = disabled;
        });

        // ၂။ စုစုပေါင်း ပစ္စည်းအရေအတွက်ကို တွက်ချက်ခြင်း
        db.collection("products").onSnapshot((querySnapshot) => {
            document.getElementById('totalProducts').innerText = querySnapshot.size;
        });

        // ၃။ စုစုပေါင်း ရောင်းရငွေကို တွက်ချက်ခြင်း (Orders collection ရှိလျှင်)
        db.collection("orders").onSnapshot((querySnapshot) => {
            let totalSales = 0;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // 'total_price' field အမည်ကို သင့် database အတိုင်း ပြင်နိုင်ပါသည်
                totalSales += Number(data.total_price || 0);
            });
            document.getElementById('totalPlatformSales').innerText = totalSales.toLocaleString() + " Ks";
        });
    </script>
</body>
</html>
