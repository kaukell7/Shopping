<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --sidebar: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        .main-content { margin-left: 280px; padding: 2.5rem; width: 100%; }
        .welcome-card { background: linear-gradient(135deg, #4f46e5, #818cf8); color: white; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; color: #1e293b; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8fafc; }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { color: #1e293b; font-weight: 600; }
        
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="#" class="nav-item active"><i class="fas fa-home"></i> &nbsp; Dashboard</a>
        <a href="#" class="nav-item"><i class="fas fa-shopping-cart"></i> &nbsp; My Orders</a>
        <a href="#" class="nav-item"><i class="fas fa-user-cog"></i> &nbsp; Profile Settings</a>
        <a href="super-admin.html" class="nav-item" style="margin-top: 20px; opacity: 0.7;"><i class="fas fa-sign-out-alt"></i> &nbsp; Logout</a>
    </div>

    <div class="main-content">
        <div class="welcome-card">
            <h1 id="welcomeAgent">Welcome back, Agent!</h1>
            <p>Here is your shop performance and account overview.</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Shop Information</h3>
                <div class="info-row">
                    <span class="info-label">Shop Name:</span>
                    <span class="info-value" id="shopName">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Contact:</span>
                    <span class="info-value" id="shopContact">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Status:</span>
                    <span class="status-badge">Active</span>
                </div>
            </div>

            <div class="card">
                <h3>Quick Stats</h3>
                <div class="info-row">
                    <span class="info-label">Total Sales:</span>
                    <span class="info-value">0 Ks</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Pending Orders:</span>
                    <span class="info-value">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ဒီအပိုင်းမှာ Agent တစ်ယောက်ချင်းစီရဲ့ data ကို 
        // Login ဝင်ထားတဲ့ အချက်အလက်ပေါ်မူတည်ပြီး Firebase ကနေ ပြန်ဆွဲပြရမှာဖြစ်ပါတယ်
        
        // ဥပမာပြသရန် -
        window.onload = function() {
            // လက်ရှိမှာတော့ ဥပမာအနေနဲ့သာ ပြထားပါတယ်
            document.getElementById('shopName').innerText = "Sample Shop";
            document.getElementById('shopContact').innerText = "agent@gmail.com";
        };
    </script>
</body>
</html>
