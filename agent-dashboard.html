<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --sidebar: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }
        
        /* Sidebar Style */
        .sidebar { width: 260px; background: var(--sidebar); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; cursor: pointer; border: none; background: transparent; width: 100%; font-size: 1rem; text-align: left; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 20px; margin-right: 10px; }

        /* Main Content */
        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .welcome-card { background: linear-gradient(135deg, #4f46e5, #818cf8); color: white; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; color: #1e293b; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8fafc; }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { color: #1e293b; font-weight: 600; }
        
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 1rem 0.5rem; }
            .sidebar h2, .nav-item span { display: none; }
            .main-content { margin-left: 100px; width: calc(100% - 100px); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="agent-dashboard.html" class="nav-item active">
            <i class="fas fa-home"></i> <span>Dashboard</span>
        </a>
        <a href="inventory.html" class="nav-item">
            <i class="fas fa-box-open"></i> <span>My Products</span>
        </a>
        <a href="profile-settings.html" class="nav-item">
            <i class="fas fa-user-cog"></i> <span>Profile Settings</span>
        </a>
        <button class="nav-item" onclick="handleLogout()" style="margin-top: 20px; opacity: 0.7;">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
    </div>

    <div class="main-content">
        <div class="welcome-card">
            <h1 id="welcomeAgent">Welcome back!</h1>
            <p>Here is your shop performance and account overview.</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Shop Information</h3>
                <div class="info-row">
                    <span class="info-label">Shop Name:</span>
                    <span class="info-value" id="shopNameDisplay">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Contact:</span>
                    <span class="info-value" id="shopContact">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Status:</span>
                    <span class="status-badge" id="accountStatus">Active</span>
                </div>
            </div>

            <div class="card">
                <h3>Quick Stats</h3>
                <div class="info-row">
                    <span class="info-label">Total Products:</span>
                    <span class="info-value" id="totalProducts">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Current Orders:</span>
                    <span class="info-value">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase Config (သင့် Project ID နှင့် ကိုက်ညီရပါမည်)
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        window.onload = function() {
            const agentData = JSON.parse(localStorage.getItem('currentAgent'));

            if (agentData) {
                // အေးဂျင့် အချက်အလက်များ ပြသခြင်း
                const displayName = agentData.name || agentData.shop_name || "Agent";
                document.getElementById('welcomeAgent').innerText = `Welcome back, ${displayName}!`;
                document.getElementById('shopNameDisplay').innerText = displayName;
                document.getElementById('shopContact').innerText = agentData.gmail_phone;
                
                // Account Status ကို ပြသခြင်း
                const statusBadge = document.getElementById('accountStatus');
                statusBadge.innerText = agentData.status || "Active";
                if(agentData.status === "Disabled") {
                    statusBadge.style.background = "#fee2e2";
                    statusBadge.style.color = "#991b1b";
                }

                // Firebase မှ ပစ္စည်းအရေအတွက်ကို Real-time ရေတွက်ခြင်း
                // မှတ်ချက်- 'agent_name' field သည် အေးဂျင့်၏ အမည်နှင့် ကိုက်ညီရပါမည်
                db.collection("products")
                  .where("agent_name", "==", displayName)
                  .onSnapshot((snapshot) => {
                      document.getElementById('totalProducts').innerText = snapshot.size;
                  });

            } else {
                // Login မဝင်ထားရင် index.html (သို့မဟုတ် login page) ကို ပြန်ပို့မည်
                window.location.href = "index.html"; 
            }
        };

        function handleLogout() {
            if(confirm("အကောင့်ထဲက ထွက်မှာ သေချာပါသလား?")) {
                localStorage.removeItem('currentAgent');
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
