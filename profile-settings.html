<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --sidebar: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; display: flex; align-items: center; margin-bottom: 0.5rem; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; max-width: 600px; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        input { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        input:disabled { background: #f1f5f9; cursor: not-allowed; color: #64748b; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1rem; }
        .btn-save:hover { background: #4338ca; transform: translateY(-1px); }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        #statusMsg, #logoStatusMsg { margin-top: 1.2rem; font-size: 0.95rem; font-weight: 600; text-align: center; min-height: 20px; }
        
        .logo-preview-box { margin-top: 10px; padding: 10px; border: 1px dashed #cbd5e1; border-radius: 8px; text-align: center; background: #f8fafc; }
        #currentLogoPreview { max-height: 80px; max-width: 150px; object-fit: contain; display: none; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="agent-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i> &nbsp; Dashboard
        </a>
        <a href="inventory.html" class="nav-item">
            <i class="fas fa-box-open"></i> &nbsp; My Products
        </a>
        <a href="profile-settings.html" class="nav-item active">
            <i class="fas fa-user-cog"></i> &nbsp; Profile Settings
        </a>
        <a href="index.html" class="nav-item" style="margin-top: 20px; opacity: 0.8;">
            <i class="fas fa-arrow-left"></i> &nbsp; Back to Shop
        </a>
    </div>

    <div class="main-content">
        <h1>Account Settings</h1>
        
        <div class="card">
            <h3><i class="fas fa-store"></i> Update Shop Information</h3>
            <div class="form-group">
                <label>Shop Name (ဆိုင်အမည်)</label>
                <input type="text" id="shopName" placeholder="Enter your shop name">
            </div>
            <div class="form-group">
                <label>Gmail / Phone (ပြင်၍မရပါ)</label>
                <input type="text" id="shopContact" disabled>
            </div>
            <div class="form-group">
                <label>New Password (လျှို့ဝှက်နံပါတ်အသစ်)</label>
                <input type="password" id="shopPass" placeholder="မပြင်လိုလျှင် အလွတ်ထားပါ">
            </div>
            <button class="btn-save" id="saveBtn" onclick="updateProfile()">
                <i class="fas fa-save"></i> Save Account Changes
            </button>
            <p id="statusMsg"></p>
        </div>

        <div class="card">
            <h3><i class="fas fa-image"></i> Shop Branding (Logo & Name)</h3>
            
            <div class="form-group">
                <label>Shop Display Name (အသုံးပြုသူများမြင်ရမည့် ဆိုင်နာမည်)</label>
                <input type="text" id="shopDisplayName" placeholder="ဥပမာ- THE PHONE HUB">
            </div>

            <div class="form-group">
                <label>Shop Tagline (ဆိုင်နာမည်အောက်တွင်ပြသမည့် စာသား)</label>
                <input type="text" id="shopTagline" placeholder="ဥပမာ- အကောင်းဆုံးဖိနပ်များ စုစည်းရာ">
            </div>

            <div class="form-group">
                <label>Shop Logo URL (Direct Link)</label>
                <input type="text" id="shopLogoUrl" placeholder="Logo Link ကိုဒီမှာထည့်ပါ" oninput="previewLogo()">
            </div>
            
            <div class="logo-preview-box">
                <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px;">Logo Preview:</p>
                <img id="currentLogoPreview" src="" alt="Logo Preview">
                <p id="noLogoText" style="font-size: 0.85rem; color: #94a3b8;">No Logo selected</p>
            </div>
            
            <button class="btn-save" id="saveLogoBtn" onclick="updateShopBranding()" style="margin-top: 1.5rem; background: #0f172a;">
                <i class="fas fa-check-circle"></i> Update Shop Logo & Name
            </button>
            <p id="logoStatusMsg"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const currentAgent = JSON.parse(localStorage.getItem('currentAgent'));

        window.onload = function() {
            if (currentAgent) {
                document.getElementById('shopName').value = currentAgent.name || currentAgent.shop_name || "";
                document.getElementById('shopContact').value = currentAgent.gmail_phone || "";
                fetchExistingBranding(); 
            } else {
                window.location.href = "index.html";
            }
        };

        // --- Branding Functions (Updated) ---

        function fetchExistingBranding() {
            db.collection("shop_settings").doc("branding").get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.logoUrl) {
                        document.getElementById('shopLogoUrl').value = data.logoUrl;
                        previewLogo();
                    }
                    if (data.shopName) {
                        document.getElementById('shopDisplayName').value = data.shopName;
                    }
                    // လက်ရှိ Tagline ကို ဆွဲယူဖော်ပြခြင်း
                    if (data.shopTagline) {
                        document.getElementById('shopTagline').value = data.shopTagline;
                    }
                }
            });
        }

        function previewLogo() {
            const url = document.getElementById('shopLogoUrl').value.trim();
            const img = document.getElementById('currentLogoPreview');
            const txt = document.getElementById('noLogoText');
            if (url) {
                img.src = url; img.style.display = "block"; txt.style.display = "none";
            } else {
                img.style.display = "none"; txt.style.display = "block";
            }
        }

        async function updateShopBranding() {
            const logoUrl = document.getElementById('shopLogoUrl').value.trim();
            const shopDisplayName = document.getElementById('shopDisplayName').value.trim();
            const shopTagline = document.getElementById('shopTagline').value.trim(); // Tagline တန်ဖိုးယူခြင်း
            const msg = document.getElementById('logoStatusMsg');
            const btn = document.getElementById('saveLogoBtn');

            if (!shopDisplayName) {
                msg.style.color = "#ef4444";
                msg.innerText = "⚠️ ဆိုင်နာမည် ဖြည့်စွက်ပေးပါ။";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                // Branding data အားလုံးကို Firebase ထဲတွင် သိမ်းဆည်းခြင်း
                await db.collection("shop_settings").doc("branding").set({
                    shopName: shopDisplayName,
                    shopTagline: shopTagline, // Tagline ကိုပါ သိမ်းဆည်းသည်
                    logoUrl: logoUrl,
                    updated_at: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                msg.style.color = "#22c55e";
                msg.innerText = "✅ ဆိုင်အချက်အလက်များ အောင်မြင်စွာ ပြောင်းလဲပြီးပါပြီ။";
            } catch (e) {
                msg.style.color = "#ef4444";
                msg.innerText = "❌ အမှားအယွင်းရှိပါသည်- " + e.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Update Shop Logo & Name';
            }
        }

        // --- Profile Functions ---
        async function updateProfile() {
            const newName = document.getElementById('shopName').value.trim();
            const newPass = document.getElementById('shopPass').value.trim();
            const statusMsg = document.getElementById('statusMsg');
            const saveBtn = document.getElementById('saveBtn');

            if (!newName) {
                statusMsg.style.color = "#ef4444";
                statusMsg.innerText = "⚠️ ဆိုင်အမည် ဖြည့်စွက်ပေးရန် လိုအပ်ပါသည်။";
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const updateData = { name: newName };
                if (newPass) updateData.password = newPass;

                const querySnapshot = await db.collection("agents")
                    .where("gmail_phone", "==", currentAgent.gmail_phone)
                    .get();

                if (querySnapshot.empty) throw new Error("အေးဂျင့် အကောင့်ကို ရှာမတွေ့ပါ။");

                const docId = querySnapshot.docs[0].id;
                await db.collection("agents").doc(docId).update(updateData);

                currentAgent.name = newName;
                if(newPass) currentAgent.password = newPass;
                localStorage.setItem('currentAgent', JSON.stringify(currentAgent));

                statusMsg.style.color = "#22c55e";
                statusMsg.innerText = "✅ အချက်အလက်များ အောင်မြင်စွာ ပြင်ဆင်ပြီးပါပြီ။";
                
                setTimeout(() => { window.location.href = "agent-dashboard.html"; }, 1500);

            } catch (error) {
                statusMsg.style.color = "#ef4444";
                statusMsg.innerText = "❌ ပြင်ဆင်မှု မအောင်မြင်ပါ။";
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Account Changes';
            }
        }
    </script>
</body>
</html>
