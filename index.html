<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Store - Order System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); overflow: hidden; text-align: center; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: zoom-in; }
        .content { padding: 15px; cursor: pointer; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .price { color: #ff4757; font-weight: bold; margin-bottom: 15px; }
        .buy-btn { background-color: #2f3542; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }

        /* Modal အားလုံးအတွက် အခြေခံ Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: white; margin: 5% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; color: #333; z-index: 101; }

        /* ပုံသီးသန့်ကြည့်မည့် Modal (Full Image) */
        #imageModal .modal-content { background: transparent; box-shadow: none; max-width: 800px; text-align: center; }
        #fullImage { width: 100%; max-height: 80vh; object-fit: contain; border-radius: 5px; }
        #imageModal .close { color: white; top: -40px; right: 0; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .submit-btn { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ရှုးဖိနပ်မျိုးစုံ အရောင်းဆိုင်</h1>
    </div>

    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" onclick="zoomImage(this.src)" alt="Nike Red">
            <div class="content" onclick="showProductDetails('Nike Red Sports', '45,000 MMK', 'https://images.unsplash.com/photo-1542291026-7eec264c27ff')">
                <div class="title">Nike Red Sports</div>
                <p class="price">45,000 MMK</p>
                <button class="buy-btn">ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" onclick="zoomImage(this.src)" alt="Adidas">
            <div class="content" onclick="showProductDetails('Adidas Street Wear', '52,000 MMK', 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a')">
                <div class="title">Adidas Street Wear</div>
                <p class="price">52,000 MMK</p>
                <button class="buy-btn">ဝယ်ယူမည်</button>
            </div>
        </div>
        
        </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('imageModal')">&times;</span>
            <img id="fullImage" src="">
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('detailsModal')">&times;</span>
            <img id="detailsModalImg" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 10px;">
            <h2 id="detailsModalName" style="margin-top:15px;"></h2>
            <p id="detailsModalPrice" style="color: #ff4757; font-weight: bold;"></p>
            <p style="color: #666; margin: 15px 0;">အသေးစိတ်အချက်အလက်များကို ဤနေရာတွင် ဖော်ပြပေးပါမည်။</p>
            <button class="buy-btn" id="modalBuyBtn">မှာယူမည်</button>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('orderModal')">&times;</span>
            <h2 id="modalProductName">မှာယူမည်</h2>
            <input type="text" id="userName" placeholder="သင့်နာမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <textarea id="userRemark" rows="4" placeholder="မှတ်ချက်..."></textarea>
            <button class="submit-btn" onclick="submitOrder()">အော်ဒါအတည်ပြုမည်</button>
        </div>
    </div>

    <script>
        let selectedProduct = "";

        // ပုံကို အကြီးချဲ့ကြည့်ရန်
        function zoomImage(imgSrc) {
            document.getElementById('fullImage').src = imgSrc;
            document.getElementById('imageModal').style.display = "block";
        }

        // ပစ္စည်းအသေးစိတ်ပြရန်
        function showProductDetails(name, price, imgSrc) {
            selectedProduct = name;
            document.getElementById('detailsModalName').innerText = name;
            document.getElementById('detailsModalPrice').innerText = price;
            document.getElementById('detailsModalImg').src = imgSrc;
            document.getElementById('detailsModal').style.display = "block";
            document.getElementById('modalBuyBtn').onclick = function() { openOrderModal(name); };
        }

        function openOrderModal(name) {
            closeModal('detailsModal');
            selectedProduct = name;
            document.getElementById('modalProductName').innerText = name + " မှာယူမည်";
            document.getElementById('orderModal').style.display = "block";
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function submitOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            if(!name || !phone) { alert("အချက်အလက်အပြည့်အစုံဖြည့်ပါ"); return; }
            alert(`ကျေးဇူးတင်ပါတယ် ${name}!\n${selectedProduct} အတွက် အော်ဒါရရှိပါပြီ။`);
            closeModal('orderModal');
        }

        window.onclick = function(e) {
            if (e.target.className === 'modal') { e.target.style.display = "none"; }
        }
    </script>
</body>
</html>
