<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHOE HUB - Premium Collection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif;
            color: #2d3436;
            padding: 20px;
        }

        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header { text-align: center; margin-bottom: 20px; padding-top: 10px; position: relative; }
        .header h1 { font-size: 32px; letter-spacing: 2px; margin-bottom: 5px; }
        
        .promo-slider {
            width: 100%;
            margin-bottom: 30px;
            height: 250px;
            background: #dfe6e9;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .slide {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            object-fit: cover;
            animation: fade 1.5s;
        }
        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
        .promo-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        .cart-container {
            position: absolute;
            right: 0px;
            top: 10px;
            cursor: pointer;
            background: #2d3436;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            z-index: 100;
        }
        .cart-container:hover { background: #d63031; }
        #historyCount { font-weight: bold; background: #d63031; padding: 2px 8px; border-radius: 50%; font-size: 12px; }

        .controls-container {
            width: 100%;
            margin: 0 auto 40px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .filter-group { display: flex; gap: 10px; }

        .filter-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #2d3436;
            color: white;
            border-color: #2d3436;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 30px; 
            width: 100%;
        }

        .card { 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            overflow: hidden; 
            transition: all 0.3s ease;
            border: 1px solid #f1f1f1;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-10px); }

        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            cursor: zoom-in;
        }

        .content { padding: 20px; text-align: center; flex-grow: 1; }
        .title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
        
        /* ဈေးနှုန်း Style သစ်များ */
        .price-container { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .original-price { text-decoration: line-through; color: #999; font-size: 14px; }
        .discount-price { color: #d63031; font-size: 19px; font-weight: 800; }

        .buy-btn { 
            background: #2d3436; color: white; border: none; padding: 12px; 
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; 
        }
        .buy-btn:hover { background: #00b894; }

        /* Modals */
        .modal { 
            display: none; position: fixed; z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        #imageModal .modal-content { background: transparent; max-width: 80vh; padding: 0; border:none; }
        #fullImage { width: 100%; max-height: 80vh; object-fit: contain; border-radius: 10px; }
        
        .close { position: absolute; right: 15px; top: -40px; font-size: 35px; cursor: pointer; color: white; }
        .modal-content .close { color: #aaa; top: 10px; right: 20px; }

        /* မှာယူမှုမှတ်တမ်း Modal အတွက် Style */
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }

        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 10px; outline: none; }
        .submit-btn { background-color: #00b894; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        @media (max-width: 768px) {
            .promo-slider { height: 180px; }
            .promo-text { font-size: 14px; bottom: 10px; left: 10px; }
            .cart-container { right: 0; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="header">
            <h1>THE SHOE HUB</h1>
            <p>Premium & Authentic Footwear Collection</p>
            <div class="cart-container" onclick="showOrderHistory()">
                <span>🛒</span>
                <span id="historyCount">0</span>
            </div>
        </div>

        <div class="promo-slider">
            <img class="slide" src="https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop">
            <img class="slide" src="https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=2070&auto=format&fit=crop">
            <img class="slide" src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=2070&auto=format&fit=crop">
            
            <div class="promo-text">
                <strong>NEW COLLECTION!</strong><br>
                ဒီတစ်ပတ်အတွက် အထူးလျော့စျေး ၃၀%
            </div>
        </div>

        <div class="controls-container">
            <div class="filter-group">
                <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                <button class="filter-btn" onclick="filterProducts('boy', this)">Boy</button>
                <button class="filter-btn" onclick="filterProducts('girl', this)">Girl</button>
                <button class="filter-btn" onclick="filterProducts('kid', this)">Kid</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search shoes..." onkeyup="searchProducts()">
            </div>
        </div>

        <div class="product-grid" id="productGrid"></div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('imageModal')">&times;</span>
            <img id="fullImage" src="">
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('orderModal')" style="top: 10px; color: #333;">&times;</span>
            <h3 id="modalProductTitle" style="margin-bottom: 15px;">မှာယူရန်</h3>
            <input type="text" id="userName" placeholder="သင့်အမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <input type="number" id="userQty" value="1" min="1" placeholder="အရေအတွက်">
            <textarea id="userAddress" placeholder="ပို့ဆောင်ရမည့် လိပ်စာ"></textarea>
            <button class="submit-btn" onclick="submitOrder()">အော်ဒါတင်မည်</button>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('historyModal')" style="top: 10px; color: #333;">&times;</span>
            <h3 style="margin-bottom: 15px;">မှာယူမှုမှတ်တမ်း</h3>
            <div id="historyList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        let selectedProduct = ""; // ရွေးချယ်ထားသော ပစ္စည်းအမည် သိမ်းရန်
        showSlides();

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 3000);
        }

        const products = [
            { id: 1, name: "Nike Red Sports", price: "45,000 MMK", original: "60,000 MMK", category: "boy", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff" },
            { id: 2, name: "Adidas Street Wear", price: "52,000 MMK", original: "70,000 MMK", category: "girl", img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" },
            { id: 3, name: "Vans Classic Black", price: "38,500 MMK", original: "50,000 MMK", category: "boy", img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" },
            { id: 4, name: "Nike Air Jordan 1", price: "125,000 MMK", original: "160,000 MMK", category: "boy", img: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" },
            { id: 5, name: "Tiny Steps Kid", price: "25,000 MMK", original: "35,000 MMK", category: "kid", img: "https://images.unsplash.com/photo-1514989940723-e8e51635b782" },
            { id: 6, name: "Pink Sparkle Girl", price: "32,000 MMK", original: "45,000 MMK", category: "girl", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2" },
            { id: 7, name: "New Balance 574", price: "88,000 MMK", original: "110,000 MMK", category: "boy", img: "https://images.unsplash.com/photo-1539185441755-769473a23570" },
            { id: 8, name: "Junior Runner", price: "35,000 MMK", original: "48,000 MMK", category: "kid", img: "https://images.unsplash.com/photo-1591195853828-11db59a44f6b" }
        ];

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <img src="${p.img}" onclick="zoomImage('${p.img}')">
                    <div class="content">
                        <div class="title">${p.name}</div>
                        <div class="price-container">
                            <span class="original-price">${p.original}</span>
                            <span class="discount-price">${p.price}</span>
                        </div>
                        <button class="buy-btn" onclick="openOrderModal('${p.name}')">ဝယ်ယူမည်</button>
                    </div>
                </div>
            `).join('');
        }

        function zoomImage(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('imageModal').style.display = "flex";
        }

        function openOrderModal(name) {
            selectedProduct = name; // အမည်သိမ်းထားတယ်
            document.getElementById('modalProductTitle').innerText = name + " မှာယူမည်";
            document.getElementById('orderModal').style.display = "flex";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function submitOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const qty = document.getElementById('userQty').value;
            const address = document.getElementById('userAddress').value;

            if(!name || !phone || !address) {
                alert("အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်ပေးပါ");
                return;
            }

            const orderData = {
                product: selectedProduct,
                quantity: qty,
                customer: name,
                date: new Date().toLocaleString()
            };

            // LocalStorage မှာ သိမ်းဆည်းခြင်း
            let history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            history.push(orderData);
            localStorage.setItem('orderHistory', JSON.stringify(history));

            updateHistoryCount();

            alert(`ကျေးဇူးတင်ပါတယ် ${name}!\n\n${selectedProduct} (${qty}) ရံ အတွက် အော်ဒါရရှိပါပြီ။`);
            
            closeModal('orderModal');
            
            // Form ရှင်းခြင်း
            document.getElementById('userName').value = "";
            document.getElementById('userPhone').value = "";
            document.getElementById('userQty').value = "1";
            document.getElementById('userAddress').value = "";
        }

        function updateHistoryCount() {
            const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            document.getElementById('historyCount').innerText = history.length;
        }

        function showOrderHistory() {
            const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = "<p>မှာယူထားသော မှတ်တမ်းမရှိသေးပါ။</p>";
            } else {
                list.innerHTML = [...history].reverse().map(item => `
                    <div class="history-item">
                        <strong>${item.product}</strong> (${item.quantity} ရံ)<br>
                        <small>📅 ${item.date}</small> | <small>👤 ${item.customer}</small>
                    </div>
                `).join('');
            }
            document.getElementById('historyModal').style.display = "flex";
        }

        // စဖွင့်ချင်း update လုပ်ပေးရန်
        updateHistoryCount();
        renderProducts(products);
    </script>
</body>
</html>
