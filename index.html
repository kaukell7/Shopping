<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Store - Order System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Product Grid ကို သေချာ ပြန်ပြင်ထားပါတယ် */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); overflow: hidden; text-align: center; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .content { padding: 15px; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .price { color: #ff4757; font-weight: bold; margin-bottom: 15px; }

        .buy-btn { 
            background-color: #2f3542; color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; 
        }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: white; margin: 10% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 25px; cursor: pointer; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .submit-btn { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ရှုးဖိနပ်မျိုးစုံ အရောင်းဆိုင်</h1>
    </div>

    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike Red">
            <div class="content">
                <div class="title">Nike Red Sports</div>
                <p class="price">45,000 MMK</p>
                <button class="buy-btn" onclick="openModal('Nike Red Sports')">ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" alt="Adidas">
            <div class="content">
                <div class="title">Adidas Street Wear</div>
                <p class="price">52,000 MMK</p>
                <button class="buy-btn" onclick="openModal('Adidas Street Wear')">ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" alt="Vans">
            <div class="content">
                <div class="title">Vans Classic</div>
                <p class="price">38,500 MMK</p>
                <button class="buy-btn" onclick="openModal('Vans Classic')">ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1584735175315-9d5df23860e6" alt="Puma">
            <div class="content">
                <div class="title">Puma Running</div>
                <p class="price">48,000 MMK</p>
                <button class="buy-btn" onclick="openModal('Puma Running')">ဝယ်ယူမည်</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalProductName">မှာယူမည်</h2>
            <hr style="margin: 15px 0; border: 0.5px solid #eee;">
            <input type="text" id="userName" placeholder="သင့်နာမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <textarea id="userRemark" rows="4" placeholder="မှတ်ချက် (အရွယ်အစား၊ အရောင် စသည်ဖြင့်...)"></textarea>
            <button class="submit-btn" onclick="submitOrder()">အော်ဒါအတည်ပြုမည်</button>
        </div>
    </div>

    <script>
        let selectedProduct = "";
        function openModal(name) {
            selectedProduct = name;
            document.getElementById('modalProductName').innerText = name + " မှာယူမည်";
            document.getElementById('orderModal').style.display = "block";
        }
        function closeModal() { document.getElementById('orderModal').style.display = "none"; }
        function submitOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const remark = document.getElementById('userRemark').value;
            if(!name || !phone) { alert("နာမည်နှင့် ဖုန်းနံပါတ် ဖြည့်ပေးပါ"); return; }
            alert(`ကျေးဇူးတင်ပါတယ် ${name}!\n${selectedProduct} အတွက် အော်ဒါရရှိပါပြီ။\nမှတ်ချက်: ${remark}`);
            closeModal();
        }
        window.onclick = function(e) { if(e.target == document.getElementById('orderModal')) closeModal(); }
    </script>
</body>
</html>
