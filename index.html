<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shoe Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif;
            color: #2d3436;
            padding: 50px 20px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 35px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            overflow: hidden; 
            transition: transform 0.3s ease;
            border: 1px solid #f1f1f1;
        }

        .card:hover { transform: translateY(-10px); }

        .card img { 
            width: 100%; 
            height: 260px; 
            object-fit: cover; 
            cursor: zoom-in;
        }

        .content { padding: 25px; text-align: center; }
        .title { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
        .price { color: #d63031; font-size: 20px; font-weight: 800; margin-bottom: 20px; display: block; }

        .buy-btn { 
            background: #2d3436;
            color: white; border: none; padding: 14px; 
            border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; 
        }

        /* --- Modal System (ပြင်ဆင်ထားသောအပိုင်း) --- */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
            /* အလယ်တည့်တည့်ပို့ရန် flex သုံးထားသည် */
            display: none; 
            align-items: center; 
            justify-content: center;
        }

        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            width: 90%; 
            max-width: 450px; 
            position: relative;
            margin: auto; /* Browser အဟောင်းများအတွက် */
        }

        /* ပုံကြည့်ရုံသီးသန့် Modal */
        #imageModal .modal-content { 
            background: transparent; 
            max-width: 80vh; /* ပုံမရှည်ထွက်သွားစေရန် */
            padding: 0;
        }

        #fullImage { 
            width: 100%; 
            max-height: 85vh; /* Screen ထက်မကျော်စေရန် */
            object-fit: contain; 
            border-radius: 10px;
        }

        .close { 
            position: absolute; 
            right: 15px; 
            top: -40px; 
            font-size: 35px; 
            cursor: pointer; 
            color: white; 
        }

        #detailsModal .close, #orderModal .close { color: #aaa; top: 10px; right: 20px; }

        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; }
        .submit-btn { background-color: #00b894; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE SHOE HUB</h1>
        <p>Premium Footwear Collection</p>
    </div>

    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" onclick="zoomImage(this.src)" alt="Nike Red">
            <div class="content" onclick="showProductDetails('Nike Red Sports', '45,000 MMK', 'https://images.unsplash.com/photo-1542291026-7eec264c27ff')">
                <div class="title">Nike Red Sports</div>
                <span class="price">45,000 MMK</span>
                <button class="buy-btn">ဝယ်ယူမည်</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" onclick="zoomImage(this.src)" alt="Adidas">
            <div class="content" onclick="showProductDetails('Adidas Street Wear', '52,000 MMK', 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a')">
                <div class="title">Adidas Street Wear</div>
                <span class="price">52,000 MMK</span>
                <button class="buy-btn">ဝယ်ယူမည်</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('imageModal')">&times;</span>
            <img id="fullImage" src="">
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('detailsModal')">&times;</span>
            <img id="detailsModalImg" src="" style="width: 100%; border-radius: 15px; height: 200px; object-fit: cover;">
            <h2 id="detailsModalName" style="margin-top:20px;"></h2>
            <p id="detailsModalPrice" style="color:#d63031; font-weight:bold; font-size:22px;"></p>
            <button class="buy-btn" id="modalBuyBtn" style="margin-top: 20px;">ယခုပဲ မှာယူမည်</button>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('orderModal')">&times;</span>
            <h2 id="modalProductName">မှာယူမည်</h2>
            <input type="text" id="userName" placeholder="သင့်နာမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <textarea id="userRemark" rows="4" placeholder="မှတ်ချက်..."></textarea>
            <button class="submit-btn" onclick="submitOrder()">အော်ဒါအတည်ပြုမည်</button>
        </div>
    </div>

    <script>
        let selectedProduct = "";

        function zoomImage(src) { 
            document.getElementById('fullImage').src = src; 
            const modal = document.getElementById('imageModal');
            modal.style.display = "flex"; // အလယ်မှာ ပေါ်စေရန် flex သုံးသည်
        }

        function showProductDetails(name, price, img) {
            selectedProduct = name;
            document.getElementById('detailsModalName').innerText = name;
            document.getElementById('detailsModalPrice').innerText = price;
            document.getElementById('detailsModalImg').src = img;
            document.getElementById('detailsModal').style.display = "flex";
            document.getElementById('modalBuyBtn').onclick = () => openOrderModal(name);
        }

        function openOrderModal(name) { 
            closeModal('detailsModal'); 
            document.getElementById('modalProductName').innerText = name; 
            document.getElementById('orderModal').style.display = "flex"; 
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function submitOrder() {
            const name = document.getElementById('userName').value;
            if(!name) { alert("နာမည်ဖြည့်ပါ"); return; }
            alert("ကျေးဇူးတင်ပါတယ် " + name + "!\n" + selectedProduct + " အတွက် အော်ဒါရရှိပါပြီ။");
            closeModal('orderModal');
        }

        window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = "none"; }
    </script>
</body>
</html>
