<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHOE HUB - Premium Collection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif;
            color: #2d3436;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; padding-top: 10px; position: relative; }
        .header h1 { font-size: 32px; letter-spacing: 2px; margin-bottom: 5px; }
        
        /* --- Promo Slider Section (အနီကွင်းနေရာသစ်) --- */
        .promo-slider {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            height: 250px;
            background: #dfe6e9;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .slide {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            object-fit: cover;
            animation: fade 1.5s;
        }
        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
        .promo-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            backdrop-filter: blur(5px);
        }

        /* --- Cart Icon Style --- */
        .cart-container {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            background: #2d3436;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            z-index: 100;
        }
        .cart-container:hover { background: #d63031; }
        #historyCount { font-weight: bold; background: #d63031; padding: 2px 8px; border-radius: 50%; font-size: 12px; }

        /* --- Filter & Search Section --- */
        .controls-container {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .filter-group { display: flex; gap: 10px; }

        .filter-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #2d3436;
            color: white;
            border-color: #2d3436;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }

        /* --- Product Grid --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            overflow: hidden; 
            transition: all 0.3s ease;
            border: 1px solid #f1f1f1;
            display: flex
