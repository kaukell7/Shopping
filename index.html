<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHOE HUB - Premium Collection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; color: #2d3436; overflow-x: hidden; }
        .main-layout { display: flex; max-width: 1500px; margin: 0 auto; padding: 0 10px; gap: 20px; }
        .sidebar-ad { width: 200px; flex-shrink: 0; padding-top: 150px; }
        .ad-box { width: 100%; height: 500px; background: #ffffff; border: 2px dashed #d63031; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 15px; position: sticky; top: 20px; color: #d63031; font-weight: bold; }
        .content-wrapper { flex-grow: 1; max-width: 1100px; }
        .header { text-align: center; padding: 40px 0 20px 0; position: relative; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .demo-logo { width: 100px; height: 60px; background-color: #2d3436; color: white; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }
        .header h1 { font-size: 32px; letter-spacing: 2px; }
        .cart-container { position: absolute; right: 0; top: 45px; cursor: pointer; background: #2d3436; color: white; padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; z-index: 100; }
        #historyCount { background: #d63031; padding: 2px 8px; border-radius: 50%; font-size: 12px; }
        .promo-slider { width: 100%; height: 380px; background: #dfe6e9; overflow: hidden; border-radius: 20px; margin-bottom: 40px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slide { width: 100%; height: 100%; display: none; position: absolute; object-fit: cover; animation: fade 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        .promo-text { position: absolute; bottom: 30px; left: 5%; background: rgba(0,0,0,0.6); color: white; padding: 15px 25px; border-radius: 12px; backdrop-filter: blur(5px); z-index: 2; }
        .controls-container { margin-bottom: 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; align-items: center; }
        .filter-btn { background: white; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .filter-btn.active { background: #2d3436; color: white; }
        .search-box input { padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; width: 250px; outline: none; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; padding-bottom: 50px; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; transition: 0.3s; border: 1px solid #f1f1f1; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 230px; object-fit: cover; background: #eee; }
        .discount-tag { position: absolute; top: 10px; right: 10px; background: #ff7675; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .content { padding: 20px; text-align: center; }
        .discount-price { color: #d63031; font-size: 18px; font-weight: 800; }
        .buy-btn { background: #2d3436; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; }
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside class="sidebar-ad">
            <div class="ad-box">AD SPACE<br>LEFT</div>
        </aside>

        <div class="content-wrapper">
            <div class="header">
                <div class="logo-container"><div class="demo-logo">Spider.io</div></div>
                <h1>THE SHOE HUB</h1>
                <p>Premium & Authentic Footwear Collection</p>
                <div class="cart-container"><span>🛒</span><span id="historyCount">0</span></div>
            </div>

            <div class="promo-slider">
                <img class="slide" src="https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop">
                <img class="slide" src="https://images.unsplash.com/photo-1514989940723-e8e51635b782?q=80&w=2070&auto=format&fit=crop">
                <div class="promo-text"><strong>NEW COLLECTION!</strong><br>ဒီတစ်ပတ်အတွက် အထူးလျော့စျေး ၃၀%</div>
            </div>

            <div class="controls-container">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                    <button class="filter-btn" onclick="filterProducts('boy', this)">Boy</button>
                    <button class="filter-btn" onclick="filterProducts('girl', this)">Girl</button>
                    <button class="filter-btn" onclick="filterProducts('kid', this)">Kid</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search shoes..." onkeyup="searchProducts()">
                </div>
            </div>

            <div class="product-grid" id="productGrid">
                <p style="text-align:center; grid-column: 1/-1;">ပစ္စည်းများအား ဆွဲတင်နေပါသည်...</p>
            </div>
        </div>

        <aside class="sidebar-ad">
            <div class="ad-box">AD SPACE<br>RIGHT</div>
        </aside>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalProductTitle">မှာယူရန်</h3>
            <input type="text" id="userName" placeholder="သင့်အမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <textarea id="userAddress" placeholder="ပို့ဆောင်ရမည့် လိပ်စာ"></textarea>
            <button class="buy-btn" style="background:#00b894; margin-top:15px;" onclick="submitOrder()">အော်ဒါတင်မည်</button>
        </div>
    </div>

    <script>
        // --- Firebase Configuration (သင့် API Key များ ပြန်ထည့်ပါ) ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "spider-io.firebaseapp.com",
            projectId: "spider-io",
            storageBucket: "spider-io.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let allProducts = [];

        // --- Firebase မှ ပစ္စည်းများ Real-time ဆွဲထုတ်ခြင်း ---
        function fetchProducts() {
            // onSnapshot ကိုသုံးထားလို့ Agent ဘက်က တင်လိုက်တာနဲ့ ချက်ချင်း ဒီမှာပေါ်ပါလိမ့်မယ်
            db.collection("products").orderBy("created_at", "desc").onSnapshot((snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts(allProducts);
            }, (error) => {
                console.error("Error: ", error);
                document.getElementById('productGrid').innerHTML = "ဒေတာချိတ်ဆက်မှု အဆင်မပြေပါ။";
            });
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            if (!items || items.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">ရောင်းရန် ပစ္စည်းမရှိသေးပါ။</p>';
                return;
            }

            grid.innerHTML = items.map(p => {
                // inventory.html က သိမ်းလိုက်တဲ့ field name တွေနဲ့ ကိုက်အောင် ယူထားပါတယ်
                const productName = p.name || 'Unnamed Product';
                const originalPrice = p.original_price || 0;
                const finalPrice = p.price || 0;
                const discount = p.discount_percent || 0;
                const image = p.imageUrl || 'https://via.placeholder.com/300';

                return `
                <div class="card">
                    ${discount > 0 ? `<div class="discount-tag">-${discount}% Off</div>` : ''}
                    <img src="${image}" alt="${productName}" onerror="this.src='https://via.placeholder.com/300'">
                    <div class="content">
                        <div style="font-weight:bold; margin-bottom:5px; font-size:16px;">${productName}</div>
                        <div style="margin-bottom:10px;">
                            ${originalPrice > 0 ? `<span style="text-decoration:line-through; color:#999; font-size:13px;">${originalPrice} Ks</span><br>` : ''}
                            <span class="discount-price">${finalPrice} Ks</span>
                        </div>
                        <button class="buy-btn" onclick="openOrderModal('${productName}')">ဝယ်ယူမည်</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => (p.name || "").toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // category field သာ database မှာ ရှိရင် အလုပ်လုပ်ပါမယ်
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function openOrderModal(name) {
            document.getElementById('modalProductTitle').innerText = name + " မှာယူမည်";
            document.getElementById('orderModal').style.display = "flex";
        }
        function closeModal() { document.getElementById('orderModal').style.display = "none"; }
        function submitOrder() {
            if(!document.getElementById('userName').value || !document.getElementById('userPhone').value) {
                alert("အမည်နှင့် ဖုန်းနံပါတ် ဖြည့်စွက်ပေးပါ");
                return;
            }
            alert("အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။");
            closeModal();
        }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            if(slides.length > 0) slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 3000);
        }

        window.onload = () => {
            fetchProducts();
            showSlides();
        };
    </script>
</body>
</html>
