<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop - Premium Collection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        /* အခြေခံ Style များ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; color: #2d3436; overflow-x: hidden; }
        .main-layout { display: flex; max-width: 1500px; margin: 0 auto; padding: 0 10px; gap: 20px; }
        
        .sidebar-ad { width: 200px; flex-shrink: 0; padding-top: 150px; }
        .ad-box { 
            width: 100%; 
            height: 500px; 
            background: #ffffff; 
            border: none; 
            border-radius: 15px; 
            position: sticky; 
            top: 20px; 
            overflow: hidden; 
        }

        /* --- Marquee Animation CSS --- */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            margin-top: 10px;
            padding: 5px 0;
        }

        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marqueeEffect 15s linear infinite;
            font-size: 16px;
            font-weight: 500;
            color: #636e72;
        }

        @keyframes marqueeEffect {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @keyframes verticalScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); } 
        }

        .ad-container { display: flex; flex-direction: column; width: 100%; }
        .ad-container img { width: 100%; height: 500px; object-fit: cover; border-radius: 12px; padding: 5px; }

        .content-wrapper { flex-grow: 1; max-width: 1100px; }
        .header { text-align: center; padding: 40px 0 20px 0; position: relative; }
        
        .logo-container { display: flex; justify-content: center; margin-bottom: 10px; min-height: 60px; }
        .demo-logo { width: 100px; height: 60px; background-color: #2d3436; color: white; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }
        #shopLogoImg { height: 60px; max-width: 180px; object-fit: contain; }

        .header h1 { font-size: 32px; letter-spacing: 2px; }
        .cart-container { position: absolute; right: 0; top: 45px; cursor: pointer; background: #2d3436; color: white; padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; z-index: 100; }
        #historyCount { background: #d63031; padding: 2px 8px; border-radius: 50%; font-size: 12px; }
        
        .controls-container { margin-bottom: 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; align-items: center; }
        .filter-btn { background: white; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .filter-btn.active { background: #2d3436; color: white; }
        .search-box input { padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; width: 250px; outline: none; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; padding-bottom: 50px; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; transition: 0.3s; border: 1px solid #f1f1f1; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 230px; object-fit: cover; background: #eee; cursor: zoom-in; }
        .discount-tag { position: absolute; top: 10px; right: 10px; background: #ff7675; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .content { padding: 20px; text-align: center; }
        .discount-price { color: #d63031; font-size: 18px; font-weight: 800; }
        .buy-btn { background: #2d3436; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s; }
        .buy-btn:hover { background: #d63031; }
        
        .image-modal { display: none; position: fixed; z-index: 10001; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: pointer; }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 25px; cursor: pointer; }

        /* --- Live Chat Floating Style --- */
        #liveChatWrapper { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        #chatOptions { display: none; flex-direction: column; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
        .chat-link { 
            color: white; padding: 12px 24px; border-radius: 50px; 
            text-decoration: none; display: flex; align-items: center; gap: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: 600; transition: 0.3s;
            cursor: pointer;
        }
        .chat-link:hover { transform: scale(1.05); }
        .main-chat-btn { 
            width: 65px; height: 65px; border-radius: 50%; background: #2d3436; 
            border: none; cursor: pointer; display: flex; justify-content: center; 
            align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .main-chat-btn:hover { transform: rotate(15deg); }

        @media (max-width: 768px) { .sidebar-ad { display: none; } }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside class="sidebar-ad">
            <div class="ad-box" id="leftAdBox"></div>
        </aside>

        <div class="content-wrapper">
            <div class="header">
                <div class="logo-container" id="logoDisplay">
                    <div class="demo-logo">Spider.io</div>
                </div>
                <h1 id="shopNameDisplay">THE SHOE HUB</h1>
                
                <div class="marquee-container">
                    <p id="shopTaglineDisplay" class="marquee-text">Loading shop information...</p>
                </div>

                <div class="cart-container"><span>🛒</span><span id="historyCount">0</span></div>
            </div>

            <div class="controls-container">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                    <button class="filter-btn" onclick="filterProducts('boy', this)">Boy</button>
                    <button class="filter-btn" onclick="filterProducts('girl', this)">Girl</button>
                    <button class="filter-btn" onclick="filterProducts('kid', this)">Kid</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search shoes..." onkeyup="searchProducts()">
                </div>
            </div>

            <div class="product-grid" id="productGrid">
                <p style="text-align:center; grid-column: 1/-1;">ပစ္စည်းများအား ဆွဲတင်နေပါသည်...</p>
            </div>
        </div>

        <aside class="sidebar-ad">
            <div class="ad-box" id="rightAdBox"></div>
        </aside>
    </div>

    <div id="liveChatWrapper">
        <div id="chatOptions">
            <a id="viberLink" href="#" target="_blank" class="chat-link" style="background: #7360f2;">🟣 Viber</a>
            <a id="telegramLink" href="#" target="_blank" class="chat-link" style="background: #0088cc;">🔵 Telegram</a>
            <a id="phoneLink" href="#" class="chat-link" style="background: #2ecc71;">📞 Call Now</a>
        </div>
        <button class="main-chat-btn" onclick="toggleChat()">
            <span style="font-size: 32px;">💬</span>
        </button>
    </div>

    <div id="imageModal" class="image-modal" onclick="this.style.display='none'">
        <img id="modalImg" src="">
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalProductTitle">မှာယူရန်</h3>
            <input type="text" id="userName" placeholder="သင့်အမည်">
            <input type="text" id="userPhone" placeholder="ဖုန်းနံပါတ်">
            <textarea id="userAddress" placeholder="ပို့ဆောင်ရမည့် လိပ်စာ"></textarea>
            <button class="buy-btn" style="background:#10b981; margin-top:15px;" onclick="submitOrder()">အော်ဒါတင်မည်</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let allProducts = [];

        // --- Live Chat Logic ---
        function toggleChat() {
            const options = document.getElementById('chatOptions');
            options.style.display = options.style.display === 'none' ? 'flex' : 'none';
        }

        // Copy Function
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("ဖုန်းနံပါတ် " + text + " ကို Copy ကူးပြီးပါပြီ။");
            }).catch(err => {
                console.error('Copy ကူးရန် အဆင်မပြေပါ: ', err);
            });
        }

        function fetchContactSettings() {
            db.collection("shop_settings").doc("contact").onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const vLink = document.getElementById('viberLink');
                    const tLink = document.getElementById('telegramLink');
                    const pLink = document.getElementById('phoneLink');

                    if(data.viber) vLink.href = `viber://chat?number=${data.viber}`;
                    
                    // Telegram Username မှန်ကန်စေရန် စစ်ဆေးခြင်း
                    if(data.telegram) {
                        let username = data.telegram;
                        if(username.startsWith('@')) username = username.substring(1);
                        tLink.href = `https://t.me/${username}`;
                    }

                    if(data.phone) {
                        // Call Now ကိုနှိပ်လျှင် Copy ကူးစေရန် ပြုလုပ်ခြင်း
                        pLink.onclick = function(e) {
                            e.preventDefault();
                            copyToClipboard(data.phone);
                        };
                    }
                }
            });
        }

        // --- Branding Logic ---
        function fetchShopBranding() {
            db.collection("shop_settings").doc("branding").onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.logoUrl) {
                        document.getElementById('logoDisplay').innerHTML = `<img src="${data.logoUrl}" id="shopLogoImg" alt="Shop Logo">`;
                    }
                    if (data.shopName) document.getElementById('shopNameDisplay').innerText = data.shopName;
                    if (data.shopTagline) document.getElementById('shopTaglineDisplay').innerText = data.shopTagline;
                }
            });
        }

        // --- Banner & Products Logic ---
        function fetchBanner() {
            db.collection("shop_banners").doc("kid kid").onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    const images = data.imageUrls || []; 
                    if(images.length > 0) {
                        renderVerticalAds('leftAdBox', images);
                        renderVerticalAds('rightAdBox', images);
                    }
                }
            });
        }

        function renderVerticalAds(containerId, images) {
            const box = document.getElementById(containerId);
            if (!box) return;
            box.innerHTML = ""; 
            const container = document.createElement('div');
            container.className = 'ad-container';
            const displayImages = [...images, ...images];
            displayImages.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                container.appendChild(img);
            });
            const duration = images.length * 5;
            container.style.animation = `verticalScroll ${duration}s linear infinite`;
            box.appendChild(container);
        }

        function fetchProducts() {
            db.collection("products").orderBy("created_at", "desc").onSnapshot((snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts(allProducts);
            });
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            if (!items || items.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">ရောင်းရန် ပစ္စည်းမရှိသေးပါ။</p>';
                return;
            }
            grid.innerHTML = items.map(p => {
                const name = p.name || 'Unnamed Shoe';
                const finalPrice = p.price || 0;
                const originalPrice = p.original_price || 0;
                const discount = p.discount_percent || 0;
                const image = p.imageUrl || 'https://via.placeholder.com/300';

                return `
                <div class="card">
                    ${discount > 0 ? `<div class="discount-tag">-${discount}%</div>` : ''}
                    <img src="${image}" alt="${name}" onclick="viewImage('${image}')">
                    <div class="content">
                        <div style="font-weight:bold; margin-bottom:5px;">${name}</div>
                        <div style="margin-bottom:10px;">
                            ${originalPrice > 0 ? `<span style="text-decoration:line-through; color:#999; font-size:13px;">${originalPrice} Ks</span><br>` : ''}
                            <span class="discount-price">${finalPrice} Ks</span>
                        </div>
                        <button class="buy-btn" onclick="openOrderModal('${name}')">ဝယ်ယူမည်</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function viewImage(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imageModal').style.display = "flex";
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => (p.name || "").toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function openOrderModal(name) {
            document.getElementById('modalProductTitle').innerText = name + " မှာယူမည်";
            document.getElementById('orderModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('orderModal').style.display = "none"; }

        function submitOrder() {
            alert("အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။");
            closeModal();
        }

        window.onload = () => {
            fetchShopBranding(); 
            fetchBanner();
            fetchProducts();
            fetchContactSettings();
        };
    </script>
</body>
</html>
