<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Settings - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; }
        
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 1.5rem 1rem; position: fixed; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; font-weight: 600; }
        .nav-item.active { background: var(--primary); color: white; }

        .main-content { margin-left: 260px; padding: 2.5rem; width: calc(100% - 260px); }
        .settings-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        
        .logo-preview { width: 100px; height: 100px; border: 2px dashed #cbd5e1; border-radius: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

        .save-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-size: 1rem; }
        .save-btn:disabled { background: #94a3b8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; padding-left: 1rem;"><i class="fas fa-spider"></i> Spider.io</div>
        <a href="agent-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> &nbsp;<span>Dashboard</span></a>
        <a href="inventory.html" class="nav-item"><i class="fas fa-box"></i> &nbsp;<span>Inventory</span></a>
        <a href="user_list.html" class="nav-item"><i class="fas fa-users"></i> &nbsp;<span>Customers</span></a>
        <a href="shop-settings.html" class="nav-item active"><i class="fas fa-cog"></i> &nbsp;<span>Shop Settings</span></a>
    </div>

    <div class="main-content">
        <h1>Shop Settings</h1>
        <p style="color: #64748b; margin-bottom: 2rem;">သင့်ဆိုင်ရဲ့ နာမည်နဲ့ Logo များကို ဤနေရာတွင် ပြင်ဆင်ပါ</p>

        <div class="settings-card">
            <div class="form-group">
                <label>Shop Logo</label>
                <input type="file" id="logoInput" accept="image/*" onchange="previewLogo(event)">
                <div class="logo-preview" id="previewBox">
                    <i class="fas fa-image" style="color: #cbd5e1; font-size: 2rem;"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Shop Name (ဆိုင်အမည်)</label>
                <input type="text" id="shopName" placeholder="ဥပမာ - Spider Fashion House">
            </div>

            <div class="form-group">
                <label>Shop Tagline (ကြော်ငြာစာသား)</label>
                <input type="text" id="shopTagline" placeholder="ဥပမာ - အကောင်းဆုံး ပစ္စည်းများကို ဈေးနှုန်းချိုသာစွာဖြင့်...">
            </div>

            <div class="form-group">
                <label>Viber Number (ဆက်သွယ်ရန်)</label>
                <input type="text" id="viber" placeholder="09xxxxxxxxx">
            </div>

            <button class="save-btn" id="saveBtn" onclick="saveSettings()">Save Changes</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // လက်ရှိ Login ဝင်ထားတဲ့ Agent (LocalStorage ကနေ ခေတ္တယူမယ်၊ ဒါပေမဲ့ Data သိမ်းတာက Firestore မှာပါ)
        const agentData = JSON.parse(localStorage.getItem('currentAgent'));
        const currentAgent = agentData ? agentData.name : "kid kid";

        // Firestore ထဲက Data အဟောင်းကို ပြန်ခေါ်ပြမယ်
        async function loadExistingSettings() {
            const doc = await db.collection("shop_settings").doc(currentAgent).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('shopName').value = data.shopName || "";
                document.getElementById('shopTagline').value = data.shopTagline || "";
                document.getElementById('viber').value = data.viber || "";
                if(data.logoUrl) {
                    document.getElementById('previewBox').innerHTML = `<img src="${data.logoUrl}">`;
                }
            }
        }

        function previewLogo(event) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('previewBox').innerHTML = `<img src="${reader.result}">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        async function saveSettings() {
            const saveBtn = document.getElementById('saveBtn');
            const file = document.getElementById('logoInput').files[0];
            const shopName = document.getElementById('shopName').value;
            const tagline = document.getElementById('shopTagline').value;
            const viber = document.getElementById('viber').value;

            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                let logoUrl = "";
                
                // ၁။ ပုံပါရင် Storage မှာအရင်သိမ်းမယ်
                if (file) {
                    const storageRef = storage.ref(`logos/${currentAgent}_logo`);
                    await storageRef.put(file);
                    logoUrl = await storageRef.getDownloadURL();
                }

                // ၂။ Firestore မှာ Data သိမ်းမယ် (ID ကို Agent Name နဲ့ထားမယ်)
                const updateData = {
                    shopName: shopName,
                    shopTagline: tagline,
                    viber: viber,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                if(logoUrl) updateData.logoUrl = logoUrl;

                await db.collection("shop_settings").doc(currentAgent).set(updateData, { merge: true });

                alert("သိမ်းဆည်းပြီးပါပြီ။");
            } catch (e) {
                console.error(e);
                alert("အမှားအယွင်းရှိနေပါသည်။");
            }
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Changes";
        }

        window.onload = loadExistingSettings;
    </script>
</body>
</html>
