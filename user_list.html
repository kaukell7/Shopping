<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer List - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --main-bg: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--main-bg); margin: 0; display: flex; }
        
        /* Sidebar Style */
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 1.5rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; color: #fff; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 24px; }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 2.5rem; width: calc(100% - 260px); box-sizing: border-box; }
        .header-section { margin-bottom: 2rem; }
        .header-section h1 { margin: 0; font-size: 1.8rem; color: #1e293b; }
        
        /* Table Style */
        .table-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8fafc; padding: 16px; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; color: #1e293b; }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; font-weight: 700; }
        
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; background: #dcfce7; color: #15803d; }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 2rem 0.5rem; }
            .sidebar h2 span, .nav-item span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-spider"></i> <span>Spider.io</span></h2>
        <a href="agent-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="inventory.html" class="nav-item"><i class="fas fa-box"></i> <span>Inventory</span></a>
        <a href="user_list.html" class="nav-item active"><i class="fas fa-users"></i> <span>Customers</span></a>
        <a href="shop-settings.html" class="nav-item"><i class="fas fa-cog"></i> <span>Shop Settings</span></a>
        <a href="#" onclick="handleLogout()" class="nav-item" style="margin-top: auto; color: #fb7185;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
    </div>

    <div class="main-content">
        <div class="header-section">
            <h1>Customer Information</h1>
            <p style="color: #64748b;">သင့် shopping မှာ အကောင့်ဖွင့်ထားသော အသုံးပြုသူများစာရင်း</p>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Email / ID</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="4" style="text-align:center; padding: 40px; color: #94a3b8;">Loading customers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function fetchUsers() {
            // "users" collection ထဲက data တွေကို ဆွဲထုတ်ခြင်း
            db.collection("users").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                const tbody = document.getElementById('userTableBody');
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px;">အကောင့်ဖွင့်ထားသည့် user မရှိသေးပါ။</td></tr>';
                    return;
                }

                tbody.innerHTML = snapshot.docs.map(doc => {
                    const user = doc.data();
                    const joinedDate = user.createdAt ? new Date(user.createdAt.seconds * 1000).toLocaleDateString() : '-';
                    const initial = user.name ? user.name.charAt(0).toUpperCase() : '?';
                    
                    return `
                        <tr>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">${initial}</div>
                                    <div style="font-weight: 700;">${user.name || 'Unknown User'}</div>
                                </div>
                            </td>
                            <td style="color: #64748b;">${user.email || user.phone || doc.id}</td>
                            <td>${joinedDate}</td>
                            <td><span class="badge">Active</span></td>
                        </tr>
                    `;
                }).join('');
            }, err => {
                console.error("Error fetching users:", err);
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding: 20px;">ဒေတာကြည့်ရှုရန် ခွင့်ပြုချက်မရှိပါ။ (Firebase Rules ကိုစစ်ပါ)</td></tr>';
            });
        }

        function handleLogout() {
            localStorage.removeItem('currentAgent');
            window.location.href = "login.html";
        }

        window.onload = fetchUsers;
    </script>
</body>
</html>
