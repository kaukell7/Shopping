<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent User List - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; --danger: #ef4444; --success: #059669; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; z-index: 1000; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; font-size: 1.5rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        
        .main-content { margin-left: 280px; padding: 2.5rem; width: calc(100% - 280px); }
        .table-card { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.2rem; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1.2rem; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; color: #1e293b; }
        
        .status-badge { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .status-active { color: var(--success); background: #ecfdf5; }
        .status-disabled { color: var(--danger); background: #fee2e2; }
        
        .btn-setting { color: #94a3b8; cursor: pointer; transition: 0.3s; font-size: 1.2rem; border: none; background: none; }
        .btn-setting:hover { color: var(--primary); transform: rotate(45deg); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 8% auto; padding: 2.5rem; border-radius: 20px; width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { margin-bottom: 2rem; font-weight: 700; font-size: 1.3rem; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 2rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #4338ca; }
        .btn-status { border: 2px solid; }
        .btn-close { background: #f8fafc; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item"><i class="fas fa-plus-circle"></i> &nbsp; Add Agent</a>
        <a href="user_list.html" class="nav-item active"><i class="fas fa-users"></i> &nbsp; User List</a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i> &nbsp; Analytics</a>
    </div>

    <div class="main-content">
        <h1>Agent Management List</h1>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Shop Name</th>
                        <th>Gmail / Phone</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Created Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="agentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Edit Agent Details</span>
                <i class="fas fa-times" style="cursor:pointer; color: #94a3b8;" onclick="closeModal()"></i>
            </div>
            <input type="hidden" id="editDocId">
            <div class="form-group">
                <label>Update Password</label>
                <input type="text" id="newPassword" placeholder="Enter new password">
            </div>
            <div class="btn-group">
                <button class="btn btn-save" onclick="updatePassword()">
                    <i class="fas fa-save"></i> Save Password
                </button>
                <button id="toggleStatusBtn" class="btn btn-status" onclick="toggleAccountStatus()">
                    Disable Account
                </button>
            </div>
            <button class="btn btn-close" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        db.collection("agents").orderBy("created_at", "desc").onSnapshot((querySnapshot) => {
            const tableBody = document.getElementById('agentTableBody');
            tableBody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const status = data.status || 'Active';
                const statusClass = status === "Disabled" ? "status-disabled" : "status-active";
                const date = data.created_at ? new Date(data.created_at.seconds * 1000).toLocaleDateString() : "Pending";
                
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${data.name}</strong></td>
                        <td>${data.gmail_phone || data.contact || 'N/A'}</td>
                        <td style="font-family: monospace;">${data.password}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                        <td>${date}</td>
                        <td>
                            <button class="btn-setting" onclick="openModal('${doc.id}', '${data.password}', '${status}')">
                                <i class="fas fa-sliders-h"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        }, (error) => {
            console.error("Firestore Error: ", error);
            if(error.message.includes("permissions")) {
                alert("Database Rules ကို Firebase Console မှာ 'allow read, write: if true;' လို့ ပြင်ပေးဖို့ လိုပါတယ်");
            }
        });

        function openModal(id, currentPass, status) {
            document.getElementById('editDocId').value = id;
            document.getElementById('newPassword').value = currentPass;
            const statusBtn = document.getElementById('toggleStatusBtn');
            
            if(status === "Disabled") {
                statusBtn.innerText = "Enable Account";
                statusBtn.style.color = "var(--success)";
                statusBtn.style.borderColor = "var(--success)";
                statusBtn.style.background = "#f0fdf4";
            } else {
                statusBtn.innerText = "Disable Account";
                statusBtn.style.color = "var(--danger)";
                statusBtn.style.borderColor = "var(--danger)";
                statusBtn.style.background = "#fef2f2";
            }
            document.getElementById('editModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('editModal').style.display = "none";
        }

        async function updatePassword() {
            const id = document.getElementById('editDocId').value;
            const newPass = document.getElementById('newPassword').value;
            if(!newPass) return alert("စကားဝှက်အသစ် ရိုက်ထည့်ပါ");
            
            try {
                await db.collection("agents").doc(id).update({ password: newPass });
                alert("Password updated successfully!");
                closeModal();
            } catch (e) {
                alert("Error: Missing permissions. Firebase Rules ကို စစ်ဆေးပါ");
            }
        }

        async function toggleAccountStatus() {
            const id = document.getElementById('editDocId').value;
            const btnText = document.getElementById('toggleStatusBtn').innerText;
            const newStatus = btnText.includes("Disable") ? "Disabled" : "Active";
            
            if(confirm(`ဒီအကောင့်ကို ${newStatus} လုပ်မှာ သေချာပါသလား?`)) {
                try {
                    await db.collection("agents").doc(id).update({ status: newStatus });
                    closeModal();
                } catch (e) {
                    alert("Error: Database permission error");
                }
            }
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('editModal')) closeModal();
        }
    </script>
</body>
</html>
