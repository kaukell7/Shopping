<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 1.5rem; color: #1e293b; }
        .input-group { text-align: left; margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 5px; color: #64748b; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .login-btn:hover { background: #4338ca; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Spider.io Login</h2>
        <div class="input-group">
            <label>Gmail / Phone</label>
            <input type="text" id="loginId" placeholder="Enter your ID">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="handleLogin()">Login</button>
        <p id="error" class="error-msg">Invalid Credentials!</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration (Admin page ထဲကအတိုင်း တစ်ထပ်တည်းဖြစ်ရပါမယ်)
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errorMsg = document.getElementById('error');

            if (!id || !pass) {
                errorMsg.innerText = "အချက်အလက်များကို ပြည့်စုံစွာဖြည့်ပါ။";
                errorMsg.style.display = 'block';
                return;
            }

            try {
                // Database ထဲမှာ အေးဂျင့်ရှိမရှိ စစ်ဆေးခြင်း
                const snapshot = await db.collection("agents")
                    .where("gmail_phone", "==", id)
                    .where("password", "==", pass)
                    .get();

                if (!snapshot.empty) {
                    const agentData = snapshot.docs[0].data();
                    // Agent data ကို localStorage တွင်သိမ်းဆည်းခြင်း
                    localStorage.setItem('currentAgent', JSON.stringify(agentData));
                    window.location.href = "agent-dashboard.html";
                } else {
                    errorMsg.innerText = "အကောင့်ဝင်ရန် အချက်အလက် မှားယွင်းနေပါသည်။";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error("Login Error: ", err);
                errorMsg.innerText = "Database ချိတ်ဆက်မှု အမှားအယွင်းရှိနေပါသည်။";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
