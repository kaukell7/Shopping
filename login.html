<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f8fafc; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
        }
        .logo { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: var(--primary); 
            margin-bottom: 0.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 { margin-bottom: 2rem; color: #1e293b; font-size: 1.2rem; font-weight: 600; }
        
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 600; color: #475569; font-size: 0.85rem; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { 
            position: absolute; 
            left: 14px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #94a3b8; 
            font-size: 1.1rem;
        }
        input { 
            width: 100%; 
            padding: 12px 12px 12px 42px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            outline: none; 
            transition: all 0.3s; 
            background: #f8fafc;
        }
        input:focus { 
            border-color: var(--primary); 
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); 
        }
        
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 1.5rem; 
            transition: 0.3s; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

        #error { 
            color: #ef4444; 
            font-size: 0.85rem; 
            margin-top: 1.2rem; 
            display: none; 
            background: #fef2f2; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #fee2e2; 
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text { margin-top: 2rem; color: #94a3b8; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"><i class="fas fa-spider"></i> Spider.io</div>
        <h1>Agent Portal Access</h1>
        
        <div class="form-group">
            <label>Gmail / Phone Number</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="text" id="loginId" placeholder="example@gmail.com" autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <span>Login to Dashboard</span>
        </button>
        
        <div id="error"></div>
        
        <div class="footer-text">
            © 2026 Spider.io System Admin
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Already logged in check
        if (localStorage.getItem('currentAgent')) {
            window.location.href = "agent-dashboard.html";
        }

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errorMsg = document.getElementById('error');
            const loginBtn = document.getElementById('loginBtn');

            if (!id || !pass) {
                showError("အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်သွင်းပါ။");
                return;
            }

            errorMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Checking account...';

            try {
                const snapshot = await db.collection("agents")
                    .where("gmail_phone", "==", id)
                    .where("password", "==", pass)
                    .get();

                if (!snapshot.empty) {
                    const doc = snapshot.docs[0];
                    const agentData = doc.data();
                    
                    if (agentData.status === "Disabled") {
                        showError("ဤအကောင့်မှာ အသုံးပြုခွင့် ပိတ်ထားခြင်းခံရပါသည်။");
                        resetBtn();
                        return;
                    }

                    const userData = {
                        uid: doc.id,
                        name: agentData.name || "Agent", 
                        gmail_phone: agentData.gmail_phone,
                        status: agentData.status || "Active"
                    };

                    localStorage.setItem('currentAgent', JSON.stringify(userData));
                    window.location.href = "agent-dashboard.html";
                } else {
                    showError("အိုင်ဒီ (သို့မဟုတ်) စကားဝှက် မှားယွင်းနေပါသည်။");
                    resetBtn();
                }
            } catch (err) {
                console.error(err);
                showError("စနစ်ချိတ်ဆက်မှု အဆင်မပြေပါ။ ခဏနေမှ ပြန်ကြိုးစားပါ။");
                resetBtn();
            }
        }

        function resetBtn() {
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<span>Login to Dashboard</span>';
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error');
            errorMsg.style.display = 'block';
            errorMsg.innerText = msg;
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
