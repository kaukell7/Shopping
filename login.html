<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
        authDomain: "my-shop-admin-cedb1.firebaseapp.com",
        projectId: "my-shop-admin-cedb1",
        storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
        messagingSenderId: "1073972515996",
        appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const errorMsg = document.getElementById('error');

        try {
            // 'agents' collection ထဲတွင် gmail_phone နှင့် password တိုက်စစ်ခြင်း
            const snapshot = await db.collection("agents")
                .where("gmail_phone", "==", id)
                .where("password", "==", pass)
                .get();

            if (!snapshot.empty) {
                const agentData = snapshot.docs[0].data();
                // ဝင်ရောက်သူ၏ data ကို browser တွင် ခေတ္တသိမ်းခြင်း
                localStorage.setItem('currentAgent', JSON.stringify(agentData));
                window.location.href = "agent-dashboard.html";
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "အကောင့်ဝင်ရန် အချက်အလက် မှားယွင်းနေပါသည်။";
            }
        } catch (err) {
            console.error("Error:", err);
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Database နှင့် ချိတ်ဆက်၍မရပါ။";
        }
    }
</script>
