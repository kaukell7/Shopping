<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider.io Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 1.5rem; color: #1e293b; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #64748b; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-login { width: 100%; padding: 0.8rem; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .btn-login:hover { background: #4338ca; }
        #error { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Spider.io Login</h1>
        
        <div class="form-group">
            <label>Gmail / Phone</label>
            <input type="text" id="loginId" placeholder="Enter your email or phone">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Enter password">
        </div>

        <button class="btn-login" onclick="handleLogin()">Login</button>
        <p id="error"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errorMsg = document.getElementById('error');

            if (!id || !pass) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "အချက်အလက်များကို အကုန်ဖြည့်ပါ။";
                return;
            }

            try {
                // Database ထဲရှိ field name 'gmail_phone' နှင့် တိုက်စစ်သည်
                const snapshot = await db.collection("agents")
                    .where("gmail_phone", "==", id)
                    .where("password", "==", pass)
                    .get();

                if (!snapshot.empty) {
                    const agentData = snapshot.docs[0].data();
                    
                    // Account ပိတ်ထားခြင်း ရှိ/မရှိ စစ်ဆေးသည်
                    if (agentData.status === "Disabled") {
                        errorMsg.style.display = 'block';
                        errorMsg.innerText = "သင်၏အကောင့်မှာ ပိတ်ထားခြင်းခံရပါသည်။";
                        return;
                    }

                    localStorage.setItem('currentAgent', JSON.stringify(agentData));
                    // GitHub ပေါ်ရှိ ဖိုင်အမည် agent-dashboard.html သို့ သွားရန်
                    window.location.href = "agent-dashboard.html";
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = "အကောင့်ဝင်ရန် အချက်အလက် မှားယွင်းနေပါသည်။ [Invalid Credentials]";
                }
            } catch (err) {
                console.error("Error:", err);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Database နှင့် ချိတ်ဆက်၍မရပါ။";
            }
        }
    </script>
</body>
</html>
