<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent User List - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; font-size: 1.5rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: 100%; }
        .table-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { color: #64748b; font-weight: 600; background: #f8fafc; }
        .status-badge { color: #059669; background: #ecfdf5; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .btn-back { float: right; background: var(--primary); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item"><i class="fas fa-plus-circle"></i> &nbsp; Add Agent</a>
        <a href="user-list.html" class="nav-item active"><i class="fas fa-users"></i> &nbsp; User List</a>
    </div>

    <div class="main-content">
        <a href="super-admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Register</a>
        <h1>Agent User List</h1>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gmail / Phone</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="agentTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // ဒေတာများကို Firebase မှ အချိန်နှင့်တပြေးညီ ဆွဲထုတ်ခြင်း
        db.collection("agents").orderBy("created_at", "desc").onSnapshot((querySnapshot) => {
            const tableBody = document.getElementById('agentTableBody');
            tableBody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.created_at ? new Date(data.created_at.seconds * 1000).toLocaleDateString() : "N/A";
                
                tableBody.innerHTML += `
                    <tr>
                        <td style="font-weight:600; color:#1e293b;">${data.name || 'N/A'}</td>
                        <td>${data.contact || 'N/A'}</td>
                        <td><code>${data.password || '****'}</code></td>
                        <td><span class="status-badge">Active</span></td>
                        <td>${date}</td>
                    </tr>`;
            });
        }, (error) => {
            console.error("Error fetching data: ", error);
        });
    </script>
</body>
</html>
