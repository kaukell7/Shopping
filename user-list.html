<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent User List - Spider.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --bg: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--bg); color: white; min-height: 100vh; padding: 2rem 1rem; position: fixed; }
        .sidebar h2 { padding-left: 1rem; margin-bottom: 2rem; font-size: 1.5rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: #cbd5e1; text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; }
        .nav-item.active { background: var(--primary); color: white; }
        .main-content { margin-left: 280px; padding: 2.5rem; width: 100%; }
        .table-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        
        /* Status Badges */
        .status-active { color: #059669; background: #ecfdf5; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .status-disabled { color: #dc2626; background: #fee2e2; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        
        /* Setting Icon */
        .btn-setting { color: #64748b; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-setting:hover { color: var(--primary); }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 2rem; border-radius: 16px; width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { margin-bottom: 1.5rem; font-weight: 700; font-size: 1.2rem; display: flex; justify-content: space-between; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn { flex: 1; padding: 0.8rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        .btn-disable { background: #ef4444; color: white; }
        .btn-close { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Spider.io</h2>
        <a href="super-admin.html" class="nav-item"><i class="fas fa-plus-circle"></i> &nbsp; Add Agent</a>
        <a href="user-list.html" class="nav-item active"><i class="fas fa-users"></i> &nbsp; User List</a>
    </div>

    <div class="main-content">
        <h1>Agent User List</h1>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gmail / Phone</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="agentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Account Settings</span>
                <i class="fas fa-times" style="cursor:pointer" onclick="closeModal()"></i>
            </div>
            <input type="hidden" id="editDocId">
            <div class="form-group">
                <label>New Password</label>
                <input type="text" id="newPassword" placeholder="Enter new password">
            </div>
            <div class="btn-group">
                <button class="btn btn-save" onclick="updatePassword()">Change Password</button>
                <button id="toggleStatusBtn" class="btn btn-disable" onclick="toggleAccountStatus()">Disable Account</button>
            </div>
            <button class="btn btn-close" style="width:100%; margin-top:10px;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt1SMVSMqdX3u2viQ-n_BVwp6KgQwDLOM",
            authDomain: "my-shop-admin-cedb1.firebaseapp.com",
            projectId: "my-shop-admin-cedb1",
            storageBucket: "my-shop-admin-cedb1.firebasestorage.app",
            messagingSenderId: "1073972515996",
            appId: "1:1073972515996:web:28049f5e5977e3a8e74959"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Data
        db.collection("agents").orderBy("created_at", "desc").onSnapshot((querySnapshot) => {
            const tableBody = document.getElementById('agentTableBody');
            tableBody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const statusClass = data.status === "Disabled" ? "status-disabled" : "status-active";
                const date = data.created_at ? new Date(data.created_at.seconds * 1000).toLocaleDateString() : "N/A";
                
                tableBody.innerHTML += `
                    <tr>
                        <td>${data.name}</td>
                        <td>${data.contact || 'N/A'}</td>
                        <td>${data.password}</td>
                        <td><span class="${statusClass}">${data.status || 'Active'}</span></td>
                        <td>${date}</td>
                        <td><i class="fas fa-cog btn-setting" onclick="openModal('${doc.id}', '${data.password}', '${data.status}')"></i></td>
                    </tr>`;
            });
        });

        // Modal Functions
        function openModal(id, currentPass, status) {
            document.getElementById('editDocId').value = id;
            document.getElementById('newPassword').value = currentPass;
            const statusBtn = document.getElementById('toggleStatusBtn');
            
            if(status === "Disabled") {
                statusBtn.innerText = "Enable Account";
                statusBtn.style.background = "#059669";
            } else {
                statusBtn.innerText = "Disable Account";
                statusBtn.style.background = "#ef4444";
            }
            
            document.getElementById('editModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('editModal').style.display = "none";
        }

        // Update Functions
        async function updatePassword() {
            const id = document.getElementById('editDocId').value;
            const newPass = document.getElementById('newPassword').value;
            await db.collection("agents").doc(id).update({ password: newPass });
            alert("Password updated!");
            closeModal();
        }

        async function toggleAccountStatus() {
            const id = document.getElementById('editDocId').value;
            const btnText = document.getElementById('toggleStatusBtn').innerText;
            const newStatus = btnText === "Disable Account" ? "Disabled" : "Active";
            
            await db.collection("agents").doc(id).update({ status: newStatus });
            alert(`Account ${newStatus}!`);
            closeModal();
        }
    </script>
</body>
</html>
